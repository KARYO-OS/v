name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      supabase_access_token:
        description: Supabase access token
        required: true
        type: string
      supabase_project_ref:
        description: Supabase project ref
        required: true
        type: string
      vite_supabase_url:
        description: Vite Supabase URL
        required: true
        type: string
      vite_supabase_anon_key:
        description: Vite Supabase anon key
        required: true
        type: string
      netlify_auth_token:
        description: Netlify auth token
        required: true
        type: string
      netlify_site_id:
        description: Netlify site id
        required: true
        type: string

permissions:
  contents: read

jobs:
  supabase-migrate:
    name: Supabase Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        run: npx -y supabase@2.91.2 link --project-ref "${{ inputs.supabase_project_ref }}"

      - name: Push Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        run: npx -y supabase@2.91.2 db push

  netlify-deploy:
    name: Netlify Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: supabase-migrate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: ${{ inputs.vite_supabase_url }}
          VITE_SUPABASE_ANON_KEY: ${{ inputs.vite_supabase_anon_key }}
        run: npm run build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ inputs.netlify_auth_token }}
        run: npx -y netlify-cli@24.11.3 deploy --dir=dist --prod --site "${{ inputs.netlify_site_id }}" --auth "$NETLIFY_AUTH_TOKEN"