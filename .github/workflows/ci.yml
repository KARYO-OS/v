name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── Job 1: Lint + Type-check (berjalan paralel dengan test) ─────────────────
  quality:
    name: Lint · Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

  # ── Job 2: Unit tests (berjalan paralel dengan quality) ─────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  # ── Job 3: Offline E2E (Playwright) ──────────────────────────────────────────
  e2e-offline:
    name: E2E Offline Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run offline workflow E2E
        run: npm run test:offline:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-offline-e2e
          path: playwright-report
          if-no-files-found: ignore

  # ── Job 4: Build (menunggu quality + test + e2e-offline lulus) ──────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test, e2e-offline]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /v/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY tidak ditemukan di Secrets maupun Variables."
            echo "Pastikan sudah ditambahkan di: GitHub → Settings → Secrets and variables → Actions"
            echo "  • Tab 'Secrets' → secret name: VITE_SUPABASE_URL"
            echo "  • Tab 'Secrets' → secret name: VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          npm run build
