name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Production URL to test
        required: true
        default: https://yuniamagsila.github.io/v/
        type: string
      mode:
        description: Test mode
        required: true
        default: extended
        type: choice
        options:
          - core
          - extended

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Test Production
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production core tests (smoke + gatepass monitor)
        if: ${{ inputs.mode == 'core' }}
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          E2E_USE_WEBSERVER: 'false'
        run: npm run test:prod:core -- --retries=1

      - name: Run production extended tests
        if: ${{ inputs.mode == 'extended' }}
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          E2E_USE_WEBSERVER: 'false'
        run: npm run test:prod:extended -- --retries=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production-smoke
          path: playwright-report
          if-no-files-found: ignore
